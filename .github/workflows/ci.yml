name: Node.js CI & CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  FIREBASE_PROJECT_ID: north-lions-v6-a7757

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            v7/package-lock.json

      - name: Install root dependencies (rules tests, firebase-tools)
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Install v7 workspace dependencies
        run: npm ci
        working-directory: v7

      - name: Ensure native build bindings on Linux runners
        run: npm i --no-save @rolldown/binding-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu
        working-directory: v7

      - name: Typecheck v7 (client, admin, functions)
        run: npm run typecheck
        working-directory: v7

      # Fork PRs do not receive repository secrets; skip frontend bundle build.
      - name: Build v7 client + admin
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        run: npm run build:client && npm run build:admin
        working-directory: v7
        env:
          VITE_LIFF_ID: ${{ secrets.VITE_LIFF_ID }}
          VITE_ADMIN_LIFF_ID: ${{ secrets.VITE_ADMIN_LIFF_ID }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_LIFF_REDIRECT_URI: ${{ secrets.VITE_LIFF_REDIRECT_URI }}
          VITE_ADMIN_LIFF_REDIRECT_URI: ${{ secrets.VITE_ADMIN_LIFF_REDIRECT_URI }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-placeholder-api-key' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'north-lions-v6-a7757.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || env.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'north-lions-v6-a7757.appspot.com' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '000000000000' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:000000000000:web:ci-placeholder' }}

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            v7/package-lock.json

      - name: Install root dependencies (firebase CLI)
        run: npm ci

      - name: Install v7 workspace dependencies
        run: npm ci
        working-directory: v7

      - name: Ensure native build bindings on Linux runners
        run: npm i --no-save @rolldown/binding-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu
        working-directory: v7

      # Deploy must never bake CI placeholder keys into Hosting. Require repo secrets.
      # Note: do not use bash indirect expansion (${!var}); Actions log redaction can break it.
      - name: Verify production Firebase web config secrets
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          missing=0
          if [ -z "${VITE_FIREBASE_API_KEY:-}" ]; then echo "::error::Missing Actions secret VITE_FIREBASE_API_KEY"; missing=1; fi
          if [ -z "${VITE_FIREBASE_AUTH_DOMAIN:-}" ]; then echo "::error::Missing Actions secret VITE_FIREBASE_AUTH_DOMAIN"; missing=1; fi
          if [ -z "${VITE_FIREBASE_PROJECT_ID:-}" ]; then echo "::error::Missing Actions secret VITE_FIREBASE_PROJECT_ID"; missing=1; fi
          if [ -z "${VITE_FIREBASE_STORAGE_BUCKET:-}" ]; then echo "::error::Missing Actions secret VITE_FIREBASE_STORAGE_BUCKET"; missing=1; fi
          if [ -z "${VITE_FIREBASE_MESSAGING_SENDER_ID:-}" ]; then echo "::error::Missing Actions secret VITE_FIREBASE_MESSAGING_SENDER_ID"; missing=1; fi
          if [ -z "${VITE_FIREBASE_APP_ID:-}" ]; then echo "::error::Missing Actions secret VITE_FIREBASE_APP_ID"; missing=1; fi
          exit "$missing"

      - name: Build v7 client + admin
        run: npm run build:client && npm run build:admin
        working-directory: v7
        env:
          VITE_LIFF_ID: ${{ secrets.VITE_LIFF_ID }}
          VITE_ADMIN_LIFF_ID: ${{ secrets.VITE_ADMIN_LIFF_ID }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_LIFF_REDIRECT_URI: ${{ secrets.VITE_LIFF_REDIRECT_URI }}
          VITE_ADMIN_LIFF_REDIRECT_URI: ${{ secrets.VITE_ADMIN_LIFF_REDIRECT_URI }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Write GCP credentials for Firebase CLI
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > "$HOME/gcp-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-key.json" >> "$GITHUB_ENV"

      # Ensures hosting targets exist on fresh checkouts (safe if .firebaserc already correct).
      - name: Ensure Hosting targets (main / admin)
        run: |
          npx firebase target:apply hosting main north-lions-v6-a7757 --project "$FIREBASE_PROJECT_ID"
          npx firebase target:apply hosting admin north-lions-v6-admin --project "$FIREBASE_PROJECT_ID"

      - name: Deploy Hosting (main + admin)
        run: npx firebase deploy --only "hosting:main,hosting:admin" --project "$FIREBASE_PROJECT_ID"

      - name: Deploy Functions (codebase from firebase.json)
        run: npx firebase deploy --only functions --project "$FIREBASE_PROJECT_ID"
