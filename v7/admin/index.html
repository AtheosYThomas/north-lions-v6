<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, max-age=0, must-revalidate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>North Lions - 財務對帳管理後台</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        var showBootError = function (reason) {
          var current = document.getElementById('admin-boot-error');
          if (current) return;
          var box = document.createElement('div');
          box.id = 'admin-boot-error';
          box.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:#f9fafb;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;z-index:99999;';
          box.innerHTML =
            '<div style="max-width:560px;width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.08)">' +
            '<h2 style="margin:0 0 8px;font-size:18px">管理後台載入失敗</h2>' +
            '<p style="margin:0 0 12px;color:#4b5563;line-height:1.5">請按「重新整理」重試。若持續發生，請回報錯誤訊息給管理員。</p>' +
            '<pre style="white-space:pre-wrap;word-break:break-word;background:#f3f4f6;border-radius:8px;padding:10px;font-size:12px;color:#374151;max-height:180px;overflow:auto">' +
            String(reason || 'Unknown bootstrap error') +
            '</pre>' +
            '<div style="margin-top:12px;display:flex;gap:8px">' +
            '<button id="admin-reload-btn" style="border:0;border-radius:8px;background:#4f46e5;color:#fff;padding:8px 12px;cursor:pointer">重新整理</button>' +
            '<button id="admin-hard-refresh-btn" style="border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111827;padding:8px 12px;cursor:pointer">強制重載</button>' +
            '</div>' +
            '</div>';
          document.body.appendChild(box);
          var reloadBtn = document.getElementById('admin-reload-btn');
          var hardReloadBtn = document.getElementById('admin-hard-refresh-btn');
          if (reloadBtn) reloadBtn.addEventListener('click', function () { window.location.reload(); });
          if (hardReloadBtn) hardReloadBtn.addEventListener('click', function () {
            var url = new URL(window.location.href);
            url.searchParams.set('refresh', '1');
            window.location.replace(url.toString());
          });
        };

        window.addEventListener('error', function (event) {
          showBootError(event && event.message ? event.message : 'window error');
        });
        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason ? (event.reason.message || String(event.reason)) : 'unhandled rejection';
          showBootError(reason);
        });

        setTimeout(function () {
          if (document.body.getAttribute('data-admin-mounted') !== '1') {
            showBootError('App did not finish bootstrap in time.');
          }
        }, 6000);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
